apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-create-twentycrm-db
  namespace: postgres-infra
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-db
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until pg_isready -h postgres-cluster1-rw -U "$PG_USER"; do sleep 2; done
              echo "Creating database twenty if not exists..."
              psql -h postgres-cluster1-rw -U "$PG_USER" \
                -c "SELECT 1 FROM pg_database WHERE datname='twenty'" | grep -q 1 \
                || psql -h postgres-cluster1-rw -U "$PG_USER" \
                   -c "CREATE DATABASE twenty OWNER twenty"
              echo "Done."
          env:
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster1-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster1-superuser
                  key: password
