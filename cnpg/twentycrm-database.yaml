apiVersion: batch/v1
kind: Job
metadata:
  name: cnpg-create-twentycrm-db
  namespace: postgres-infra
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-db
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for postgres to be ready..."
              until pg_isready -h postgres-cluster1-rw -U "$PG_USER"; do sleep 2; done
              echo "Checking if database twenty exists..."
              EXISTS=$(psql -h postgres-cluster1-rw -U "$PG_USER" -tAc \
                "SELECT 1 FROM pg_database WHERE datname='twenty'")
              if [ "$EXISTS" = "1" ]; then
                echo "Database twenty already exists, skipping."
              else
                echo "Creating database twenty..."
                psql -h postgres-cluster1-rw -U "$PG_USER" \
                  -c "CREATE DATABASE twenty OWNER twenty"
                echo "Database twenty created."
              fi
          env:
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster1-superuser
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-cluster1-superuser
                  key: password
