apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserusemcp
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
  labels:
    app: browserusemcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: browserusemcp
  template:
    metadata:
      labels:
        app: browserusemcp
    spec:
      containers:
      - name: browserusemcp
        image: browseruse/browseruse:0.12.9
        imagePullPolicy: IfNotPresent
        # browser-use only ships a stdio MCP server (`browser-use --mcp`).
        # mcp-proxy wraps that stdio process and exposes it over SSE so it can
        # be reached through a Kubernetes Service.
        command: ["/bin/sh", "-c"]
        args:
          # pip (the image's venv is root-owned) installs mcp-proxy into the
          # browseruse user site (~/.local/bin), which is not on PATH, so add it
          # before exec or `mcp-proxy` resolves to nothing (exit 127).
          - |
            pip install --no-cache-dir mcp-proxy && \
            export PATH="$HOME/.local/bin:$PATH" && \
            exec mcp-proxy --host 0.0.0.0 --port 8000 -- browser-use --mcp
        ports:
        - containerPort: 8000
          name: sse
        env:
        # browser-use 0.12.9 MCP has no native Ollama provider, so we use
        # Ollama's OpenAI-compatible endpoint. The OpenAI SDK reads these envs
        # directly; the dummy key is required but ignored by Ollama.
        - name: OPENAI_BASE_URL
          value: "http://192.168.1.79:11434/v1"
        - name: OPENAI_API_KEY
          value: "ollama"
        # Default model / provider come from this config file (mounted from the
        # browserusemcp-config ConfigMap).
        - name: BROWSER_USE_CONFIG_PATH
          value: "/config/config.json"
        # Run Chromium headless inside the pod.
        - name: BROWSER_USE_HEADLESS
          value: "true"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 4Gi
        volumeMounts:
        - name: data
          mountPath: /home/browseruse/.config/browseruse
        - name: config
          mountPath: /config
          readOnly: true
        # SSE keeps connections open, so probe the TCP socket instead of an
        # HTTP GET (which would hang on the event stream).
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: browserusemcp-data
      - name: config
        configMap:
          name: browserusemcp-config
