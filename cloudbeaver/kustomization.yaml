apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

secretGenerator:
  - name: informix-jdbc
    files:
      - informix-jdbc.jar=drivers/informix-jdbc.jar
    options:
      disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/name: cloudbeaver
  app.kubernetes.io/component: database-client

images:
  - name: dbeaver/cloudbeaver
    newTag: latest
