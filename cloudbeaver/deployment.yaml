apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudbeaver
  labels:
    app: cloudbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      initContainers:
      - name: seed-informix-driver
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -euo pipefail
          SRC=/informix-driver
          DEST=/workspace/GlobalConfiguration/.dbeaver/drivers/informix
          if [ ! -f "$SRC"/informix-jdbc.jar ]; then
            echo "Informix JDBC jar not mounted; skipping seed step"
            exit 0
          fi
          mkdir -p "$DEST"
          cp "$SRC"/informix-jdbc.jar "$DEST"/informix-jdbc.jar
          chmod 640 "$DEST"/informix-jdbc.jar
        volumeMounts:
        - name: informix-jdbc
          mountPath: /informix-driver
        - name: workspace
          mountPath: /workspace
      containers:
      - name: cloudbeaver
        image: dbeaver/cloudbeaver:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8978
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: workspace
          mountPath: /opt/cloudbeaver/workspace
        - name: informix-jdbc
          mountPath: /opt/cloudbeaver/custom-drivers/informix
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 8978
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8978
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: cloudbeaver-data
      - name: informix-jdbc
        secret:
          secretName: informix-jdbc
          optional: true
