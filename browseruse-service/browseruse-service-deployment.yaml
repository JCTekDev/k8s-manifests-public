apiVersion: apps/v1
kind: Deployment
metadata:
  name: browseruse-service
  labels:
    app: browseruse-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: browseruse-service
  template:
    metadata:
      labels:
        app: browseruse-service
    spec:
      imagePullSecrets:
      # Unsealed from k8s-manifests-private/browseruse-service-secrets by the
      # browseruse-service-secrets ArgoCD app (sync-wave 1).
      - name: ghcr-pull
      containers:
      - name: browseruse-service
        # Built from github.com/devopian/browseruse-service (FastAPI + ChatOllama
        # on top of the browser-use library). See that repo for the Dockerfile.
        image: ghcr.io/devopian/browseruse-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        # Ollama native API base (no /v1 suffix; ChatOllama uses the native client).
        - name: OLLAMA_HOST
          value: "http://192.168.1.79:11434"
        - name: BROWSER_USE_MODEL
          value: "qwen2.5:14b-instruct-q4_K_M"
        # Local 14b models need more steps to converge; raise the default.
        - name: BROWSER_USE_MAX_STEPS
          value: "15"
        # Persistent Chrome profile directory for authenticated sessions.
        - name: BROWSER_USE_USER_DATA_DIR
          value: "/data/chrome-profile"
        # Playwright storage state for cookie/session reuse across restarts.
        - name: BROWSER_USE_STORAGE_STATE
          value: "/data/storage_state.json"
        resources:
          # Real headful Chrome + Xvfb uses noticeably more memory than the
          # previous headless Chromium, so requests/limits are raised.
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 6Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 5
        volumeMounts:
        # Chromium needs more shared memory than the 64Mi default /dev/shm in
        # Kubernetes, or it hangs on startup.
        - name: dshm
          mountPath: /dev/shm
        # Persistent browser profile / session state so it survives pod
        # restarts. The app must point its user-data-dir at /data and clear any
        # stale Chrome SingletonLock on startup, or Chrome will hang.
        - name: data
          mountPath: /data
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      - name: data
        persistentVolumeClaim:
          claimName: browseruse-service-data
