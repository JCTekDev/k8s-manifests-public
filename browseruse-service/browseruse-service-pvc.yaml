apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: browseruse-service-data
  labels:
    app: browseruse-service
  annotations:
    # Bind the volume before the Deployment rolls out.
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
  storageClassName: "local-path"
